# RelicWeaponPlugin Configuration
# All values are hot-reloadable via /relicweapon reload

relic_weapon:
  # Cooldown in seconds between ability uses
  cooldown: 8

  # ── Mobility / Dash ─────────────────────────────────────────────────────────
  dash_power: 1.4
  # Extra upward component of dash (0 = horizontal only)
  dash_vertical: 0.3
  # Play particle trail during dash
  dash_particles: true

  # ── Throw / Return ──────────────────────────────────────────────────────────
  throw_enabled: true
  # Velocity multiplier when thrown
  throw_power: 2.5
  # Return to player after X ticks (0 = no return)
  return_delay_ticks: 60
  # Return to player on hit
  return_on_hit: true

  # ── Impact / Smash ──────────────────────────────────────────────────────────
  # Multiplier applied on top of vanilla damage
  damage_multiplier: 2.0
  # Bonus damage per block fallen (Mace mechanic)
  fall_damage_per_block: 0.5
  # Maximum fall bonus damage cap (0 = no cap)
  fall_damage_cap: 20.0
  # Radius of wind-burst AOE knockback on smash
  wind_burst_radius: 3.0
  # AOE knockback power of wind burst
  wind_burst_power: 1.5

  # ── Spear Mechanics ─────────────────────────────────────────────────────────
  # Extra reach blocks (Spear 1.21.11 mechanic)
  extra_reach: 1.0
  # Charge lunge: hold right-click for this many ticks, then release to lunge
  charge_lunge_ticks: 20
  # Damage multiplier when lunging (speed bonus)
  lunge_speed_damage_multiplier: 1.8

  # ── Trident Mechanics ───────────────────────────────────────────────────────
  # Riptide-style launch on right-click while in water or rain
  riptide_enabled: true
  riptide_power: 3.0
  # Channeling: summon lightning on hit during thunderstorm
  channeling_enabled: true
  # Loyalty-style auto return level (1–3, 0 = disabled)
  loyalty_level: 2

  # ── Model Data ──────────────────────────────────────────────────────────────
  model_id: 1001
  model_id_charged: 1002
  model_id_thrown: 1003

  # ── Item Appearance ─────────────────────────────────────────────────────────
  display_name: "&5&l⚡ Relic Weapon"
  lore:
    - "&7A weapon forged from ancient relics."
    - "&8Right-Click&7: Dash / Charge Lunge"
    - "&8Left-Click&7: Smash Attack (fall bonus)"
    - "&8Sneak + Right-Click&7: Throw"
    - "&6Enchantable. Unstoppable."
