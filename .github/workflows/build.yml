name: Build RelicWeaponPlugin

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build with Gradle
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 25 ────────────────────────────────────────────────────────────
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle

      # ── Gradle permissions ─────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: RelicWeaponPlugin-${{ github.run_number }}
          path: build/libs/RelicWeaponPlugin-*.jar
          retention-days: 14
